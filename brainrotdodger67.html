<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brainrot Dodger 67</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #1a0b1c; 
            overflow: hidden;
            font-family: 'Comic Sans MS', sans-serif;
            color: #0f0;
            cursor: none;
        }

        #ui {
            position: fixed;
            top: 15px;
            left: 15px;
            z-index: 1000;
            background: rgba(0,0,0,0.9);
            padding: 15px;
            border: 2px solid #0f0;
            box-shadow: 4px 4px 0px #ff00ff;
            pointer-events: none;
        }

        #player {
            position: absolute;
            width: 60px;
            height: 60px;
            font-size: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 500;
            pointer-events: none;
            will-change: transform;
        }

        #player.active-shield {
            filter: drop-shadow(0 0 15px #00ffff) drop-shadow(0 0 30px #ff00ff);
        }

        .trash {
            position: absolute;
            background-size: contain;
            background-position: center;
            background-repeat: no-repeat;
            z-index: 400;
            border: 4px solid #ff0000;
            box-shadow: 0 0 15px #ff0000;
            border-radius: 8px;
        }

        .coin, .shield-item {
            position: absolute;
            background-size: contain;
            background-position: center;
            background-repeat: no-repeat;
            z-index: 400;
            border: 4px solid #00ff00;
            box-shadow: 0 0 15px #00ff00;
            border-radius: 50%;
        }

        #game-over {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #fff;
            color: #000;
            padding: 40px;
            border: 10px solid #ff0000;
            text-align: center;
            z-index: 9999;
            width: 80%;
            max-width: 450px;
        }

        .pop-text {
            position: absolute;
            font-weight: 900;
            font-size: 30px;
            pointer-events: none;
            text-shadow: 2px 2px 0 #000;
            z-index: 600;
            animation: popUp 0.7s ease-out forwards;
        }

        @keyframes popUp {
            0% { opacity: 1; transform: scale(0.5) translateY(0); }
            100% { opacity: 0; transform: scale(1.4) translateY(-100px); }
        }

        button {
            background: #0f0;
            color: #000;
            border: none;
            padding: 15px 30px;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <div id="ui">
        AURA: <span id="score">0</span><br>
        SHIELDS: <span id="shield-count">0</span>
    </div>

    <div id="player">🗿</div>

    <div id="game-over">
        <h1 style="color: red; margin: 0; font-size: 40px;">L + RATIO</h1>
        <p id="death-quote" style="margin: 20px 0; font-weight: bold;"></p>
        <p>Final Aura: <span id="final-score">0</span></p>
        <button onclick="window.location.reload()">RE-MEW</button>
    </div>

    <script>
        const player = document.getElementById('player');
        const scoreElement = document.getElementById('score');
        const shieldCountElement = document.getElementById('shield-count');
        const gameOverScreen = document.getElementById('game-over');
        
        let score = 0;
        let shields = 0;
        let gameActive = true;

        let pX = window.innerWidth / 2;
        let pY = window.innerHeight / 2;

        document.addEventListener('mousemove', (e) => {
            if (!gameActive) return;
            pX = e.clientX;
            pY = e.clientY;
            player.style.transform = `translate(${pX - 30}px, ${pY - 30}px)`;
        });

        const trashImages = [
            'https://static.wikia.nocookie.net/skibidi-toilet-official/images/9/99/NormalToiletImage.png',
            'https://iili.io/BHmvmzJ.webp',
            'https://images.steamusercontent.com/ugc/13283701333937821338/5EE3BD10B2174E40FB1E232C5B606F868C16EAEB/',
            'https://media.tenor.com/UgqVjSHIq9sAAAAe/charlie-kirk-charlie-kirk-meme.png',
            'https://media.tenor.com/VKjH_tjzM6AAAAAe/ai-baby.png',
            'https://static.wikia.nocookie.net/joke-battles/images/0/05/Doge.png',
            'https://ih1.redbubble.net/image.5820242749.8868/st,small,507x507-pad,600x600,f8f8f8.jpg', // NEW LINK
            'https://static.wikia.nocookie.net/character-stats-and-profiles/images/5/52/Sahur2.webp',
            'https://shapes.inc/_next/image?url=https%3A%2F%2Ffiles.shapes.inc%2Fapi%2Ffiles%2Favatar_66c8fba9-44ea-44c5-a328-1b9e146fd6a4.png&w=3840&q=72',
            'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTLRrzqtJa67GwJof5b-rP6l37CVzwRDnIsUg&s'
        ];

        const coinImages = [
            'https://www.mango.org/wp-content/uploads/2024/06/Mango_Varieties_hero_img.png',
            'https://www.masterfoods.com.au/sites/g/files/fnmzdf1746/files/migrate-product-files/vqkwrxy7fwzb7xvrad8y.png'
        ];

        const deathQuotes = [
            "L + Ratio + No Rizz.", "Bros aura just went into the negatives.",
            "Sticking out your gyatt for the rizzler...", "POV: You are from Ohio.",
            "6-7! 6-7! 6-7!", "You definitely didn't drink the Grimace Shake.",
            "Go back to Mewing, you're washed.", "Tralalero Tralala caught you slipping.",
            "Just put the fries in the bag, bro.", "Your social credit score: -999,999",
            "Bro is the definition of a Choppelganger 💀", "Is this a skill issue or are you just acoustic?",
            "You got Fanum Taxed by a PNG.", "Aura Debt: -50,000. Pay up, blud.",
            "Bro really died to a 2016 meme in 2026.", "Your Mewing streak just ended. Brutal.",
            "Caught in 4K being a beta male.", "Skibidi Slicing through your remaining aura.",
            "Even the AI Baby is laughing at you.", "You aren't that guy, pal. Trust me.",
            "Blud thinks he's the Main Character 💀", "Absolute negative aura performance.",
            "You just got Mogged by a Skibidi Toilet.", "Where is your 6-7 energy now?",
            "Bro is yapping in the game over screen.", "The Council of Sigmas has rejected you.",
            "You hit the 'Griddy' right into a JPEG.", "Bombardiro Crocodilo sent you back to the lobby.",
            "Certified L. No aura detected.", "You're not invited to the TikTok Rizz Party."
        ];

        const hypeMessages = [
            "W RIZZ!", "AURA +10,000!", "CERTIFIED SIGMA!", 
            "LOOKSMAXING!", "6-7 ENERGY!", "BREAD GAINED!",
            "ABSOLUTE MOGGER!", "POGGERS!", "FANUM IMMUNITY!"
        ];

        function spawnItem(type) {
            if (!gameActive) return;
            const item = document.createElement('div');
            item.className = type;
            
            let url;
            if (type === 'trash') url = trashImages[Math.floor(Math.random() * trashImages.length)];
            else if (type === 'coin') url = coinImages[Math.floor(Math.random() * coinImages.length)];
            else url = 'https://upload.wikimedia.org/wikipedia/commons/thumb/8/87/GrimaceShake.jpg/500px-GrimaceShake.jpg';

            item.style.backgroundImage = `url('${url}')`;
            const size = (type === 'trash') ? (85 + Math.random() * 45) : 70;
            const radius = size / 2;
            item.style.width = size + 'px'; item.style.height = size + 'px';
            
            // RANDOM ROTATION ADDED HERE
            const randomRotation = Math.floor(Math.random() * 360);
            
            let posX = Math.random() * (window.innerWidth - size);
            let posY = -size;
            document.body.appendChild(item);

            let speed = (type === 'trash') ? (5 + score / 38) : 4.5;
            speed = Math.min(speed, 22);

            const fall = setInterval(() => {
                if (!gameActive) { item.remove(); clearInterval(fall); return; }
                posY += speed;
                // Apply translation AND the fixed random rotation
                item.style.transform = `translate(${posX}px, ${posY}px) rotate(${randomRotation}deg)`;

                const dx = (posX + radius) - pX;
                const dy = (posY + radius) - pY;
                const dist = Math.sqrt(dx*dx + dy*dy);

                if (dist < (radius + 28)) {
                    if (type === 'trash') {
                        if (shields > 0) { breakShield(); item.remove(); clearInterval(fall); }
                        else { endGame(); }
                    } else if (type === 'coin') {
                        collectCoin(); item.remove(); clearInterval(fall);
                    } else {
                        collectShield(); item.remove(); clearInterval(fall);
                    }
                }

                if (posY > window.innerHeight) {
                    if (type === 'trash') { score++; scoreElement.innerText = score; }
                    item.remove(); clearInterval(fall);
                }
            }, 16);

            let next;
            if (type === 'trash') next = Math.max(140, 480 - (score * 4));
            else if (type === 'coin') next = 3000 + Math.random() * 3000;
            else next = 11000 + Math.random() * 7000;
            
            setTimeout(() => spawnItem(type), next);
        }

        function collectCoin() {
            score += 10;
            scoreElement.innerText = score;
            const msg = hypeMessages[Math.floor(Math.random() * hypeMessages.length)];
            showPop(msg, "#00ff00");
        }

        function collectShield() {
            shields++;
            shieldCountElement.innerText = shields;
            player.classList.add('active-shield');
            showPop("SHIELD GAINED", "#00ffff");
        }

        function breakShield() {
            shields--;
            shieldCountElement.innerText = shields;
            if (shields <= 0) player.classList.remove('active-shield');
            showPop("SHIELD BROKEN", "#ff00ff");
        }

        function showPop(text, color) {
            const pop = document.createElement('div');
            pop.className = 'pop-text';
            pop.innerText = text;
            pop.style.color = color;
            pop.style.left = pX + 'px'; pop.style.top = pY + 'px';
            document.body.appendChild(pop);
            setTimeout(() => pop.remove(), 700);
        }

        function endGame() {
            gameActive = false;
            gameOverScreen.style.display = 'block';
            document.getElementById('final-score').innerText = score;
            document.getElementById('death-quote').innerText = `"${deathQuotes[Math.floor(Math.random() * deathQuotes.length)]}"`;
        }

        spawnItem('trash');
        setTimeout(() => spawnItem('coin'), 2000);
        setTimeout(() => spawnItem('shield-item'), 6000);
    </script>
</body>
</html>
